<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi Kontak - Company Profile Mahasiswa</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .info-section {
            margin-bottom: 20px;
        }
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .info-item strong {
            width: 120px;
            color: #555;
        }
        .social-links a {
            margin-right: 15px;
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        .social-links a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .info-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .info-item strong {
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Informasi Kontak Kami</h1>
        
        <div class="info-section">
            <div class="info-item">
                <strong>Alamat:</strong>
                <span>Jl. Pendidikan No. 123, Kampus Merdeka, Kota Teknologi, Indonesia</span>
            </div>
            <div class="info-item">
                <strong>Email:</strong>
                <span>contact@mahasiswaprofile.id</span>
            </div>
            <div class="info-item">
                <strong>Telepon:</strong>
                <span>+62 812-3456-7890</span>
            </div>
        </div>

        <div class="info-section">
            <h2>Media Sosial</h2>
            <div class="social-links">
                <a href="#">Instagram</a>
                <a href="#">LinkedIn</a>
                <a href="#">GitHub</a>
                <a href="#">Twitter/X</a>
            </div>
        </div>
    </div>
</body>
</html>
