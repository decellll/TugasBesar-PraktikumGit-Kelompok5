<div class="contact-form-container">
    <h2>Kirim Pesan kepada Kami</h2>
    <p>Punya pertanyaan atau ingin berkolaborasi? Silakan isi formulir di bawah ini.</p>
    
    <form action="#" method="POST" class="contact-form">
        <div class="form-group">
            <label for="name">Nama Lengkap</label>
            <input type="text" id="name" name="name" placeholder="Masukkan nama lengkap Anda" required>
        </div>

        <div class="form-group">
            <label for="email">Alamat Email</label>
            <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
        </div>

        <div class="form-group">
            <label for="message">Pesan Anda</label>
            <textarea id="message" name="message" rows="5" placeholder="Tuliskan pesan Anda di sini..." required></textarea>
        </div>

        <button type="submit" class="btn-submit">Kirim Pesan</button>
    </form>
</div>

<style>
    .contact-form-container {
        padding: 20px;
        background: #fff;
        border-radius: 8px;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    .form-group input, .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    .btn-submit {
        background-color: #007bff;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
    }
    .btn-submit:hover {
        background-color: #0056b3;
    }
</style>
